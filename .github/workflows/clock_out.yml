name: Qandle Clock Out

on:
  schedule:
    - cron: '30 17 * * 1-5'  # 11:00 PM IST (Mon-Fri)
  workflow_dispatch:

jobs:
  clock-out:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache Playwright browser
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Clock Out
        env:
          QANDLE_EMAIL: ${{ secrets.QANDLE_EMAIL }}
          QANDLE_PASSWORD: ${{ secrets.QANDLE_PASSWORD }}
          CI: "true"
        run: python clock.py out
